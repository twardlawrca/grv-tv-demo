<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recovery Centers of America at Greenville &mdash; Welcome (full cut)</title>
<style>
  *{margin:0}html,body{height:100%;background:#000;overflow:hidden;font-family:Georgia,'Times New Roman',serif;}
  #v{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
  #vig{position:fixed;inset:0;z-index:1;pointer-events:none;
       background:radial-gradient(ellipse at 50% 46%,transparent 54%,rgba(0,0,0,.46) 100%),
                  linear-gradient(to top,rgba(4,16,24,.42) 0%,transparent 30%),
                  linear-gradient(to bottom,rgba(4,16,24,.22) 0%,transparent 16%);}
  #grain{position:fixed;top:-8%;left:-8%;width:116%;height:116%;z-index:1;pointer-events:none;opacity:.07;
         background:url(grain.png) repeat;background-size:300px;animation:gr .5s steps(3) infinite;}
  @keyframes gr{0%{transform:translate(0,0)}33%{transform:translate(-3%,2%)}66%{transform:translate(2%,-3%)}100%{transform:translate(-1%,2%)}}
  #tap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4;
       background:radial-gradient(ellipse at 50% 45%,rgba(8,30,46,.35) 0%,rgba(4,14,22,.66) 80%);transition:opacity .6s ease;}
  #tap.hide{opacity:0;pointer-events:none;}
  #tap .b{display:flex;flex-direction:column;align-items:center;gap:2.2vh;text-align:center;text-shadow:0 3px 26px rgba(0,0,0,.85);}
  #tap .ic{font-size:6vw;line-height:1;}
  #tap .t{color:#fff;font-size:2vw;font-weight:600;letter-spacing:.16em;}
  #tap .s{color:#cfe0ea;font-size:1.1vw;font-style:italic;}
  #cred{position:fixed;left:1.6vw;bottom:1.6vh;z-index:3;color:rgba(207,224,234,.6);font-size:.85vw;font-style:italic;
        text-shadow:0 2px 10px rgba(0,0,0,.8);pointer-events:none;}
</style></head>
<body>
  <video id="v" src="welcome-long-scored.mp4" autoplay loop muted playsinline></video>
  <div id="vig"></div>
  <div id="grain"></div>
  <div id="cred">~62s &middot; Music: &ldquo;Powerful Dramatic&rdquo; (Pixabay) &middot; Voice: Elise (ElevenLabs), EQ-brightened</div>
  <div id="tap"><div class="b">
    <div class="ic">&#128266;</div>
    <div class="t">TAP FOR SOUND</div>
    <div class="s">full cut &mdash; cinematic grade, music + narration</div>
  </div></div>
<script>
  var v=document.getElementById('v'), t=document.getElementById('tap');
  v.play().catch(function(){});
  function go(){ v.muted=false; v.currentTime=0; var p=v.play(); if(p&&p.catch)p.catch(function(){}); t.className='hide'; }
  t.addEventListener('click', go); t.addEventListener('touchstart', go);
</script>
</body></html>
