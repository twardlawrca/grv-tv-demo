<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recovery Centers of America at Greenville &mdash; Welcome (with sound)</title>
<style>
  *{margin:0}html,body{height:100%;background:#000;overflow:hidden;font-family:Georgia,'Times New Roman',serif;}
  #v{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;}
  #tap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;
       background:radial-gradient(ellipse at 50% 45%,rgba(8,30,46,.35) 0%,rgba(4,14,22,.62) 80%);transition:opacity .6s ease;}
  #tap.hide{opacity:0;pointer-events:none;}
  #tap .b{display:flex;flex-direction:column;align-items:center;gap:2.4vh;text-align:center;text-shadow:0 3px 26px rgba(0,0,0,.85);}
  #tap .ic{font-size:6vw;line-height:1;}
  #tap .t{color:#fff;font-size:2vw;font-weight:600;letter-spacing:.16em;}
  #tap .s{color:#cfe0ea;font-size:1.1vw;font-style:italic;letter-spacing:.04em;}
  #cred{position:fixed;left:2vw;bottom:2vh;z-index:1;color:rgba(207,224,234,.6);font-size:.9vw;font-style:italic;
        text-shadow:0 2px 10px rgba(0,0,0,.8);pointer-events:none;}
</style></head>
<body>
  <video id="v" src="welcome-cohesive-scored.mp4" autoplay loop muted playsinline></video>
  <div id="cred">Music: &ldquo;Heartwarming&rdquo; by Kevin MacLeod &middot; CC BY 4.0</div>
  <div id="tap"><div class="b">
    <div class="ic">&#128266;</div>
    <div class="t">TAP FOR SOUND</div>
    <div class="s">&ldquo;Heartwarming&rdquo; &mdash; a gentle test score</div>
  </div></div>
<script>
  var v=document.getElementById('v'), t=document.getElementById('tap');
  v.play().catch(function(){});
  function go(){ v.muted=false; v.currentTime=0; var p=v.play(); if(p&&p.catch)p.catch(function(){}); t.className='hide'; }
  t.addEventListener('click', go); t.addEventListener('touchstart', go);
</script>
</body></html>
