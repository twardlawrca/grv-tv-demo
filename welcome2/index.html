<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recovery Centers of America at Greenville &mdash; Welcome</title>
<style>
  *{margin:0;box-sizing:border-box;}
  html,body{height:100%;background:#071c2a;overflow:hidden;cursor:none;font-family:Georgia,'Times New Roman',serif;}
  #stage{position:fixed;inset:0;background:#071c2a;overflow:hidden;}
  /* continuous crossfade layers -- each scene dissolves into the next, no hard breaks */
  .layer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.05);
         transition:opacity 1.2s ease;will-change:opacity,transform;}
  .layer.show{opacity:1;}
  .layer.kb{transition:opacity 1.2s ease, transform 8.5s ease-out;transform:scale(1.15);}
  #bug{position:fixed;right:3.2vw;bottom:5.2vh;width:13vw;max-width:260px;opacity:0;transition:opacity 1.4s ease;z-index:5;
       filter:drop-shadow(0 2px 12px rgba(0,0,0,.65));}
  #bug.on{opacity:.58;}
  #intro{position:fixed;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;
         text-align:center;background:radial-gradient(ellipse at 50% 42%,#10384f 0%,#071c2a 72%);transition:opacity 1.2s ease;}
  #intro.hide{opacity:0;pointer-events:none;}
  #intro .l1{color:#fff;font-size:3.0vw;font-weight:600;letter-spacing:.16em;opacity:0;transform:translateY(20px);}
  #intro .ln{height:2px;width:0;background:#C69C3C;margin:2.6vh 0;opacity:0;border-radius:2px;}
  #intro .l2{color:#e9d3a0;font-size:1.6vw;letter-spacing:.46em;opacity:0;transform:translateY(14px);}
  #intro .l3{color:#cfe0ea;font-size:1.55vw;font-style:italic;letter-spacing:.05em;margin-top:3.2vh;opacity:0;transform:translateY(14px);}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  @keyframes draw{to{opacity:1;width:24vw;}}
  #intro.go .l1{animation:rise 1.3s .25s forwards cubic-bezier(.2,.7,.2,1);}
  #intro.go .ln{animation:draw 1.2s 1.15s forwards cubic-bezier(.2,.7,.2,1);}
  #intro.go .l2{animation:rise 1.2s 1.45s forwards cubic-bezier(.2,.7,.2,1);}
  #intro.go .l3{animation:rise 1.3s 2.7s forwards cubic-bezier(.2,.7,.2,1);}
  #cap{position:fixed;left:0;right:0;bottom:14vh;z-index:5;text-align:center;padding:0 8vw;
       text-shadow:0 2px 26px rgba(0,0,0,.85);pointer-events:none;}
  #cap .t{color:#fff;font-size:3.0vw;font-weight:600;opacity:0;transform:translateY(22px);letter-spacing:.01em;}
  #cap .u{height:2px;width:0;background:#C69C3C;margin:1.7vh auto 0;border-radius:2px;}
  #cap .s{color:#e9d3a0;font-size:1.55vw;font-style:italic;letter-spacing:.06em;opacity:0;transform:translateY(14px);margin-top:1vh;}
  #cap.show .t{animation:rise 1.1s .1s forwards cubic-bezier(.2,.7,.2,1);}
  #cap.show .u{animation:cdraw 1.1s .7s forwards cubic-bezier(.2,.7,.2,1);}
  #cap.show .s{animation:rise 1.1s .5s forwards cubic-bezier(.2,.7,.2,1);}
  @keyframes cdraw{to{width:16vw;}}
  #cap.out{opacity:0;transition:opacity .7s ease;}
  #vig{position:fixed;inset:0;z-index:4;pointer-events:none;
       background:linear-gradient(to top,rgba(7,28,42,.55) 0%,transparent 36%),linear-gradient(to bottom,rgba(7,28,42,.28) 0%,transparent 20%);}
  #grain{position:fixed;top:-8%;left:-8%;width:116%;height:116%;z-index:4;pointer-events:none;opacity:.07;
         background:url(grain.png) repeat;background-size:280px;animation:gr .55s steps(3) infinite;}
  @keyframes gr{0%{transform:translate(0,0)}33%{transform:translate(-4%,3%)}66%{transform:translate(3%,-4%)}100%{transform:translate(-2%,2%)}}
</style></head>
<body>
  <div id="stage">
    <video id="vA" class="layer" muted playsinline preload="auto"></video>
    <video id="vB" class="layer" muted playsinline preload="auto"></video>
    <img   id="vI" class="layer" alt="">
  </div>
  <div id="vig"></div>
  <div id="grain"></div>
  <img id="bug" src="rca-lockup.png" alt="">
  <div id="cap"><div class="t" id="capt"></div><div class="u"></div><div class="s" id="caps"></div></div>
  <div id="intro">
    <div class="l1">RECOVERY CENTERS OF AMERICA</div>
    <div class="ln"></div>
    <div class="l2">AT GREENVILLE</div>
    <div class="l3">Ten Years of Saving Lives</div>
  </div>
<script>
  var SEQ=[
    {src:'p1-sunrise.mp4',    t:'',                            s:''},
    {src:'p2-lake.mp4',       t:'A place to begin again',     s:''},
    {img:'p3-building.jpg',   t:'Comprehensive care',         s:'South Carolina Upstate'},
    {src:'p4-path.mp4',       t:'Every step forward matters', s:''},
    {src:'p5-connection.mp4', t:'You are never alone',        s:''},
    {src:'p6-vista.mp4',      t:'Hope. Healing.',             s:'A new beginning.'},
    {src:'p7-seal.mp4',       t:'',                            s:''}
  ];
  var vA=document.getElementById('vA'), vB=document.getElementById('vB'), vI=document.getElementById('vI'),
      bug=document.getElementById('bug'), cap=document.getElementById('cap'),
      capt=document.getElementById('capt'), caps=document.getElementById('caps'), intro=document.getElementById('intro');
  var vids=[vA,vB], vi=0, active=null, i=-1, _t=null;
  var XF=1.2;   // crossfade seconds (matches the .layer transition)
  function showCap(c){
    cap.className=''; void cap.offsetWidth;
    if(c.t||c.s){ capt.textContent=c.t; caps.textContent=c.s; setTimeout(function(){ cap.className='show'; }, 700); }
    else { capt.textContent=''; caps.textContent=''; }
  }
  function pick(c){ if(c.img) return vI; var L=vids[vi]; if(L===active){ vi=1-vi; L=vids[vi]; } vi=1-vi; return L; }
  function play(idx){
    i=idx; var c=SEQ[i]; if(_t){ clearTimeout(_t); _t=null; }
    var L=pick(c), old=active;
    L.classList.remove('show','kb'); void L.offsetWidth; L._adv=false;
    if(c.img){ L.src=c.img; } else { L.src=c.src; var p=L.play(); if(p&&p.catch)p.catch(function(){}); }
    bug.className = (c.src && c.src.indexOf('seal')>=0) ? '' : 'on';
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      L.classList.add('show','kb');
      if(old && old!==L){ old.classList.remove('show'); var o=old;
        setTimeout(function(){ if(o!==active && o.tagName==='VIDEO'){ try{o.pause();}catch(e){} } }, XF*1000+200); }
    });});
    active=L; showCap(c);
    if(c.img){ _t=setTimeout(function(){ play((i+1)%SEQ.length); }, 5400); }
  }
  function advNear(e){ var V=e.target; if(V!==active||V._adv) return;
    if(V.duration && V.currentTime > V.duration - XF - 0.05){ V._adv=true;
      if(cap.className.indexOf('show')>=0) cap.className='show out'; play((i+1)%SEQ.length); } }
  [vA,vB].forEach(function(V){
    V.addEventListener('timeupdate', advNear);
    V.addEventListener('ended', function(){ if(this===active && !this._adv){ this._adv=true; play((i+1)%SEQ.length); } });
    V.addEventListener('error', function(){ if(this===active){ play((i+1)%SEQ.length); } });
  });
  window.addEventListener('load', function(){
    void intro.offsetWidth; intro.className='go';
    setTimeout(function(){ intro.className='go hide'; play(0); }, 4400);
  });
</script>
</body></html>
