<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recovery Centers of America at Greenville &mdash; Welcome</title>
<style>
  *{margin:0;box-sizing:border-box;}
  html,body{height:100%;background:#000;overflow:hidden;cursor:none;font-family:Georgia,'Times New Roman',serif;}
  #stage{position:fixed;inset:0;background:#000;overflow:hidden;}
  /* ONE continuous film -- a single stitched video, looping. No per-scene engine, no navy fades. */
  #film{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  /* cinematic finish overlays */
  #vig{position:fixed;inset:0;z-index:4;pointer-events:none;
       background:radial-gradient(ellipse at 50% 46%,transparent 52%,rgba(0,0,0,.42) 100%),
                  linear-gradient(to top,rgba(4,16,24,.50) 0%,transparent 34%),
                  linear-gradient(to bottom,rgba(4,16,24,.26) 0%,transparent 18%);}
  #grain{position:fixed;top:-8%;left:-8%;width:116%;height:116%;z-index:5;pointer-events:none;opacity:.06;
         background:url(grain.png) repeat;background-size:300px;animation:gr .5s steps(3) infinite;}
  @keyframes gr{0%{transform:translate(0,0)}33%{transform:translate(-3%,2%)}66%{transform:translate(2%,-3%)}100%{transform:translate(-1%,2%)}}
  #bug{position:fixed;right:3.2vw;bottom:5.4vh;width:12vw;max-width:230px;opacity:0;transition:opacity 1.4s ease;z-index:6;
       filter:drop-shadow(0 2px 14px rgba(0,0,0,.82));}
  #bug.on{opacity:.88;}

  /* OPENING title -- plays once over the sunrise, then clears to let the film breathe */
  #open{position:fixed;inset:0;z-index:8;display:flex;flex-direction:column;align-items:center;justify-content:center;
        text-align:center;background:radial-gradient(ellipse at 50% 44%,rgba(8,30,46,.40) 0%,rgba(4,14,22,.74) 78%);
        transition:opacity 1.3s ease;}
  #open.hide{opacity:0;pointer-events:none;}
  #open .l1{color:#fff;font-size:3.0vw;font-weight:600;letter-spacing:.16em;opacity:0;transform:translateY(20px);
            text-shadow:0 3px 30px rgba(0,0,0,.8);}
  #open .ln{height:2px;width:0;background:#C69C3C;margin:2.6vh 0;opacity:0;border-radius:2px;box-shadow:0 0 18px rgba(198,156,60,.6);}
  #open .l2{color:#e9d3a0;font-size:1.6vw;letter-spacing:.46em;opacity:0;transform:translateY(14px);text-shadow:0 2px 22px rgba(0,0,0,.8);}
  #open .l3{color:#cfe0ea;font-size:1.55vw;font-style:italic;letter-spacing:.05em;margin-top:3.2vh;opacity:0;transform:translateY(14px);
            text-shadow:0 2px 22px rgba(0,0,0,.8);}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  @keyframes draw{to{opacity:1;width:24vw;}}
  #open.go .l1{animation:rise 1.3s .35s forwards cubic-bezier(.2,.7,.2,1);}
  #open.go .ln{animation:draw 1.2s 1.25s forwards cubic-bezier(.2,.7,.2,1);}
  #open.go .l2{animation:rise 1.2s 1.55s forwards cubic-bezier(.2,.7,.2,1);}
  #open.go .l3{animation:rise 1.3s 2.8s forwards cubic-bezier(.2,.7,.2,1);}

  /* REASON lines -- "why recovery matters", fade gently over the shots, never gating the film */
  #reason{position:fixed;left:0;right:0;bottom:18vh;z-index:7;text-align:center;opacity:0;transform:translateY(14px);
          transition:opacity .9s ease, transform .9s ease;pointer-events:none;}
  #reason.show{opacity:1;transform:translateY(0);}
  #reason span{color:#e9d3a0;font-style:italic;font-size:2.4vw;letter-spacing:.06em;text-shadow:0 3px 28px rgba(0,0,0,.92);}

  /* CLOSING lockup -- lands over the final walk-into-light shot, every loop */
  #close{position:fixed;left:0;right:0;bottom:15vh;z-index:7;text-align:center;padding:0 8vw;opacity:0;
         transition:opacity 1.1s ease;pointer-events:none;text-shadow:0 3px 30px rgba(0,0,0,.9);}
  #close.show{opacity:1;}
  #close .w{color:#fff;font-size:2.5vw;font-weight:600;letter-spacing:.05em;}
  #close .u{height:2px;width:14vw;background:#C69C3C;margin:1.6vh auto;border-radius:2px;box-shadow:0 0 16px rgba(198,156,60,.55);}
  #close .s{color:#e9d3a0;font-size:1.5vw;font-style:italic;letter-spacing:.06em;}
</style></head>
<body>
  <div id="stage">
    <video id="film" muted playsinline preload="auto" loop src="welcome-cohesive.mp4"></video>
  </div>
  <div id="vig"></div>
  <div id="grain"></div>
  <img id="bug" src="rca-seal-10yr.png" alt="">
  <div id="reason"><span></span></div>
  <div id="close"><div class="w">Recovery Centers of America at Greenville</div><div class="u"></div><div class="s">Ten Years of Saving Lives</div></div>
  <div id="open">
    <div class="l1">RECOVERY CENTERS OF AMERICA</div>
    <div class="ln"></div>
    <div class="l2">AT GREENVILLE</div>
    <div class="l3">Ten Years of Saving Lives</div>
  </div>
<script>
  var film=document.getElementById('film'), open=document.getElementById('open'),
      close=document.getElementById('close'), bug=document.getElementById('bug'),
      reason=document.getElementById('reason'), reasonT=reason.firstChild;
  // "why recovery matters" -- timed to the diverse shots (self / family / community)
  var CAPS=[
    {a:8.55, b:10.30, t:'For yourself.'},
    {a:10.90,b:12.50, t:'For your family.'},
    {a:15.25,b:17.10, t:'For each other.'}
  ];
  var curCap=-1;
  function startFilm(){ var p=film.play(); if(p&&p.catch)p.catch(function(){ setTimeout(startFilm,400); }); }
  film.addEventListener('timeupdate', function(){
    var d=film.duration||19.5, t=film.currentTime;
    // reason lines
    var hit=-1;
    for(var k=0;k<CAPS.length;k++){ if(t>=CAPS[k].a && t<=CAPS[k].b){ hit=k; break; } }
    if(hit!==curCap){
      curCap=hit;
      if(hit>=0){ reasonT.textContent=CAPS[hit].t; reason.className='show'; }
      else { reason.className=''; }
    }
    // closing brand lockup over the final shot
    if(t > d-3.0 && t < d-0.15){ close.className='show'; } else { close.className=''; }
  });
  window.addEventListener('load', function(){
    startFilm();
    void open.offsetWidth; open.className='go';            // opening title rises over the sunrise
    setTimeout(function(){ open.className='go hide'; bug.className='on'; }, 4400);  // clear to the film, bring up the corner bug
  });
</script>
</body></html>
